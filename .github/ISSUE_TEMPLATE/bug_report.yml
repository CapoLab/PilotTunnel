name: Bug report
description: Report a reproducible problem in PilotTunnel
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please keep examples generic. Do not include secrets, private hosts, private ports, or production identifiers.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Describe the steps using placeholders where needed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share OS, Python version, and command context without private data.
